name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  BACKEND_UNIT_COVERAGE_MIN: "0.20"
  BACKEND_INTEGRATION_COVERAGE_MIN: "0.40"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: OneTake-back-end
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET (NuGet cache)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            OneTake-back-end/**/*.slnx
            OneTake-back-end/**/*.csproj
            OneTake-back-end/**/packages.lock.json
            OneTake-back-end/**/Directory.Packages.props

      - name: Restore dependencies
        run: dotnet restore OneTake-back-end.slnx

      - name: Build
        run: dotnet build OneTake-back-end.slnx -c Release --no-restore

      - name: Format check (backend)
        run: dotnet format OneTake-back-end.slnx --verify-no-changes --no-restore

  unit-tests:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: OneTake-back-end
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET (NuGet cache)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            OneTake-back-end/**/*.slnx
            OneTake-back-end/**/*.csproj
            OneTake-back-end/**/packages.lock.json
            OneTake-back-end/**/Directory.Packages.props

      - name: Restore dependencies
        run: dotnet restore OneTake-back-end.slnx

      - name: Build
        run: dotnet build OneTake-back-end.slnx -c Release --no-restore

      - name: Test (Unit)
        run: >
          dotnet test tests/OneTake.UnitTests/OneTake.UnitTests.csproj
          -c Release --no-build
          --collect "XPlat Code Coverage"
          --results-directory ./TestResults/Unit
          --settings coverlet.runsettings
          --logger "trx;LogFileName=unit-tests.trx"

      - name: Coverage Gate (Unit)
        if: always()
        run: |
          if [ ! -f "$GITHUB_STEP_SUMMARY" ]; then
            touch "$GITHUB_STEP_SUMMARY"
          fi
          if ! grep -q "^| Suite | Line coverage | Required minimum | Report |$" "$GITHUB_STEP_SUMMARY"; then
            {
              echo "## Backend coverage summary"
              echo
              echo "| Suite | Line coverage | Required minimum | Report |"
              echo "| --- | --- | --- | --- |"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          python3 scripts/check_coverage.py \
            --pattern "TestResults/Unit/**/coverage.cobertura.xml" \
            --label "Backend unit tests" \
            --min-line-rate "${BACKEND_UNIT_COVERAGE_MIN}" \
            --summary-file "$GITHUB_STEP_SUMMARY"

      - name: Test Report (Unit)
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: ".NET Unit Tests"
          path: "OneTake-back-end/TestResults/Unit/**/*.trx"
          reporter: "dotnet-trx"
          fail-on-error: "false"

      - name: Upload TestResults (Unit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: OneTake-back-end/TestResults/Unit/

      - name: Upload coverage (Unit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: OneTake-back-end/TestResults/Unit/**/coverage.cobertura.xml

  integration-tests:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: OneTake-back-end
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET (NuGet cache)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            OneTake-back-end/**/*.slnx
            OneTake-back-end/**/*.csproj
            OneTake-back-end/**/packages.lock.json
            OneTake-back-end/**/Directory.Packages.props

      - name: Restore dependencies
        run: dotnet restore OneTake-back-end.slnx

      - name: Build
        run: dotnet build OneTake-back-end.slnx -c Release --no-restore

      - name: Test (Integration)
        run: >
          dotnet test tests/OneTake.IntegrationTests/OneTake.IntegrationTests.csproj
          -c Release --no-build
          --collect "XPlat Code Coverage"
          --results-directory ./TestResults/Integration
          --settings coverlet.runsettings
          --logger "trx;LogFileName=integration-tests.trx"

      - name: Coverage Gate (Integration)
        if: always()
        run: |
          if [ ! -f "$GITHUB_STEP_SUMMARY" ]; then
            touch "$GITHUB_STEP_SUMMARY"
          fi
          if ! grep -q "^| Suite | Line coverage | Required minimum | Report |$" "$GITHUB_STEP_SUMMARY"; then
            {
              echo "## Backend coverage summary"
              echo
              echo "| Suite | Line coverage | Required minimum | Report |"
              echo "| --- | --- | --- | --- |"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          python3 scripts/check_coverage.py \
            --pattern "TestResults/Integration/**/coverage.cobertura.xml" \
            --label "Backend integration tests" \
            --min-line-rate "${BACKEND_INTEGRATION_COVERAGE_MIN}" \
            --summary-file "$GITHUB_STEP_SUMMARY"

      - name: Test Report (Integration)
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: ".NET Integration Tests"
          path: "OneTake-back-end/TestResults/Integration/**/*.trx"
          reporter: "dotnet-trx"
          fail-on-error: "false"

      - name: Upload TestResults (Integration)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: OneTake-back-end/TestResults/Integration/

      - name: Upload coverage (Integration)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage
          path: OneTake-back-end/TestResults/Integration/**/coverage.cobertura.xml

  frontend-lint-format:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: onetake-front-end
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: onetake-front-end/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

  analytics-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: OneTakeAnalytics
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            OneTakeAnalytics/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: pytest
